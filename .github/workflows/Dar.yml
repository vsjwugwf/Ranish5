name: Ranish5

on:
  schedule:
    - cron: '0 0 * * *'    # 00:00 UTC
    - cron: '0 6 * * *'    # 06:00 UTC
    - cron: '0 12 * * *'   # 12:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5h 55m

    concurrency:
      group: ranish-bot-runner
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pulseaudio wget tor p7zip-full

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 playwright aiohttp
          playwright install --with-deps chromium

      - name: Set environment variables
        run: echo "BALE_BOT_TOKEN=${{ secrets.BALE_BOT_TOKEN }}" >> $GITHUB_ENV

      - name: Run Ranish Bot
        run: python main.py
